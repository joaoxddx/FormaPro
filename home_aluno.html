<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Aluno - FormaPro</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-secondary shadow-sm glassmorphism">
        <div class="container">
            <a class="navbar-brand fw-bold" href="home_aluno.html">
                <i class="bi bi-person-badge-fill me-2"></i>FormaPro - Área do Aluno
            </a>
            <div class="ms-auto d-flex align-items-center text-white">
                <span id="nome-usuario-logado" class="me-3 fw-bold"></span>
                <button id="btn-logout" class="btn btn-outline-light btn-sm">Sair</button>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="p-4 mb-4 rounded-3 gradient-hero text-white shadow-sm hero-section" style="background: linear-gradient(135deg, #10b981 0%, #047857 100%);">
            <div class="container-fluid py-2">
                <h2 class="fw-bold">Bem-vindo(a) aos seus estudos!</h2>
                <p class="fs-5">Explore os cursos disponíveis e acompanhe seu progresso.</p>
            </div>
        </div>

        <!-- Menu Superior (Abas) -->
        <ul class="nav nav-tabs mb-4" id="homeAlunoTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link fw-bold text-success" id="meuscursos-tab" data-bs-toggle="tab" data-bs-target="#tab-meuscursos" type="button" role="tab">Meus Cursos (Aulas)</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link active fw-bold text-primary" id="cursos-tab" data-bs-toggle="tab" data-bs-target="#tab-cursos" type="button" role="tab">Explorar Cursos</button>
            </li>
        </ul>

        <div class="tab-content" id="homeAlunoTabsContent">
            <!-- ABA: MEUS CURSOS -->
            <div class="tab-pane fade" id="tab-meuscursos" role="tabpanel">
                <h3 class="fw-bold mb-4">Continuar Aprendendo</h3>
                <div class="row g-4" id="lista-meus-cursos">
                    <!-- Meus Cursos JS -->
                </div>
            </div>

            <!-- ABA: EXPLORAR CURSOS -->
            <div class="tab-pane fade show active" id="tab-cursos" role="tabpanel">
                <h3 class="fw-bold mb-4">Cursos Disponíveis</h3>
                <div class="row g-4" id="vitrine-cursos">
                    <!-- Cursos JS -->
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Player de Aulas -->
    <div class="modal fade" id="modalSalaAula" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title fw-bold" id="modalSalaAulaTitle">Sala de Aula</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-0 d-flex flex-column flex-md-row" style="min-height: 60vh;">
                    <div class="bg-light p-4 col-md-8 d-flex align-items-center justify-content-center text-center">
                        <div id="player-container">
                            <i class="bi bi-play-circle-fill text-muted" style="font-size: 5rem;"></i>
                            <h4 class="mt-3 text-muted">Aguardando seleção da aula...</h4>
                        </div>
                    </div>
                    <div class="bg-white border-start col-md-4 h-100 overflow-auto" style="max-height: 60vh;">
                        <div class="list-group list-group-flush" id="lista-conteudo-curso">
                            <!-- Aulas Renderizadas JS -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Comentários / Avaliações -->
    <div class="modal fade" id="modalComentarios" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-light">
                    <h5 class="modal-title fw-bold" id="modalComentariosTitle">Avaliações do Curso</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" style="background-color: #f8fafc;">
                    <div id="lista-avaliacoes" class="mb-4">
                        <!-- Comentários -->
                    </div>
                    
                    <hr>
                    <h6 class="fw-bold">Deixe seu comentário!</h6>
                    <form id="form-comentario">
                        <input type="hidden" id="com-curso-id">
                        <div class="mb-3">
                            <label class="form-label">Nota (1 a 5)</label>
                            <select class="form-select w-25" id="com-nota" required>
                                <option value="5">5 - Excelente</option>
                                <option value="4">4 - Muito Bom</option>
                                <option value="3">3 - Bom</option>
                                <option value="2">2 - Regular</option>
                                <option value="1">1 - Ruim</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Comentário</label>
                            <textarea class="form-control" id="com-texto" rows="2" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-success">Enviar Avaliação</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="controller/HomeAlunoController.mjs"></script>
</body>
</html>
