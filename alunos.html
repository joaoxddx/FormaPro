<script>
    const user = sessionStorage.getItem('usuarioLogado');
    if (!user) {
        window.location.href = 'login.html';
    } else {
        const parsed = JSON.parse(user);
        if(parsed.Papel !== 'Admin' && parsed.Email !== 'admin@formapro.com') {
            window.location.href = 'home_aluno.html';
        }
    }
</script>
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área do Aluno - FormaPro</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm glassmorphism">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-mortarboard-fill me-2"></i>FormaPro
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="academico.html">Módulo Acadêmico</a></li>
                    <li class="nav-item"><a class="nav-link" href="financeiro.html">Assinaturas</a></li>
                    <li class="nav-item"><a class="nav-link active" aria-current="page" href="alunos.html">Área do Aluno</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <h2 class="fw-bold mb-4">Central do Aluno</h2>

        <!-- Navegação em Abas -->
        <ul class="nav nav-tabs mb-4" id="alunoTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="cadastro-tab" data-bs-toggle="tab" data-bs-target="#cadastro" type="button" role="tab">Gestão de Alunos (Registro)</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="matriculas-tab" data-bs-toggle="tab" data-bs-target="#matriculas" type="button" role="tab">Matrículas e Progresso</button>
            </li>
        </ul>

        <div class="tab-content" id="alunoTabsContent">
            <!-- TAB CADASTRO/USUARIOS -->
            <div class="tab-pane fade show active" id="cadastro" role="tabpanel">
                <div class="row">
                    <div class="col-md-4 mb-4">
                        <div class="card shadow-sm border-0">
                            <div class="card-header bg-white text-primary fw-bold">Novo Aluno</div>
                            <div class="card-body">
                                <form id="form-aluno">
                                    <div class="mb-3">
                                        <label for="alu-nome" class="form-label">Nome Completo</label>
                                        <input type="text" class="form-control" id="alu-nome" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="alu-email" class="form-label">E-mail</label>
                                        <input type="email" class="form-control" id="alu-email" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="alu-senha" class="form-label">Senha</label>
                                        <input type="password" class="form-control" id="alu-senha" required>
                                    </div>
                                    <button type="submit" class="btn btn-primary w-100">Criar Aluno</button>
                                </form>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <div class="card shadow-sm border-0">
                            <div class="card-body">
                                <div class="table-responsive">
                                    <table class="table table-hover align-middle">
                                        <thead class="table-light">
                                            <tr>
                                                <th>Nome</th>
                                                <th>E-mail</th>
                                                <th>Membro de</th>
                                                <th>Ação</th>
                                            </tr>
                                        </thead>
                                        <tbody id="lista-alunos">
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- TAB MATRICULAS E PROGRESSO -->
            <div class="tab-pane fade" id="matriculas" role="tabpanel">
                <div class="card shadow-sm border-0 mb-4 bg-white">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-3">Simulador de Matrícula</h5>
                        <form id="form-matricula" class="row align-items-end g-3">
                            <div class="col-md-4">
                                <label for="mat-aluno" class="form-label">Selecione o Aluno</label>
                                <select class="form-select" id="mat-aluno" required></select>
                            </div>
                            <div class="col-md-5">
                                <label for="mat-curso" class="form-label">Selecione o Curso</label>
                                <select class="form-select" id="mat-curso" required></select>
                            </div>
                            <div class="col-md-3">
                                <button type="submit" class="btn btn-success w-100">Matricular Aluno</button>
                            </div>
                        </form>
                    </div>
                </div>

                <h4 class="fw-bold mb-3">Progressos Recentes</h4>
                <div class="row g-4" id="lista-matriculas">
                    <!-- Cards de matrícula serão renderizados aqui -->
                </div>
            </div>
        </div>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="controller/AlunoController.mjs"></script>
</body>
</html>
