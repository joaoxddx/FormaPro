<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FormaPro</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
        }
        .login-card {
            max-width: 400px;
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            background: white;
            padding: 2rem;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-primary"><i class="bi bi-mortarboard-fill me-2"></i>FormaPro</h2>
            <p class="text-muted">Faça login para acessar a plataforma</p>
        </div>

        <div id="login-error" class="alert alert-danger d-none" role="alert">
            E-mail ou senha inválidos!
        </div>

        <form id="form-login">
            <div class="mb-3">
                <label for="login-email" class="form-label fw-bold">E-mail</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="bi bi-person-fill"></i></span>
                    <input type="email" class="form-control" id="login-email" placeholder="admin@formapro.com" required>
                </div>
            </div>
            <div class="mb-4">
                <label for="login-senha" class="form-label fw-bold">Senha</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" class="form-control" id="login-senha" placeholder="123456" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold pulse-hover">Entrar</button>
        </form>
        
        <div class="mt-4 text-center text-muted small border-top pt-3">
            <p>Dica: admin@formapro.com ou aluno@formapro.com (Senha: 123456)</p>
            <a href="vitrine_publica.html" class="text-decoration-none fw-bold text-success"><i class="bi bi-shop"></i> Ver Cursos e Planos (Visita)</a>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Entry module -->
    <script type="module" src="controller/LoginController.mjs"></script>
</body>
</html>
